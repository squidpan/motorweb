apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-application-api
  namespace: mwp-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-application-api
  template:
    metadata:
      labels:
        app: job-application-api
    spec:
      containers:
        - name: api
          image: job-application-api:latest
          ports:
            - containerPort: 8000
